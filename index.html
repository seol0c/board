<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>seolboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4ed;
    --paper: #fffdf7;
    --ink: #1a1a1a;
    --muted: #6b6358;
    --line: #d9d2c2;
    --accent: #8b2a2a;
    --new: #e8821a;        /* 주황 점 */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.6;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.25rem 1.5rem;
  }

  /* ── 상단 바 ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .topbar .right {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .btn {
    background: var(--paper);
    border: 1px solid var(--line);
    color: var(--muted);
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 0.15rem 0.55rem;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    white-space: nowrap;
  }
  .btn:hover { background: #fff; border-color: var(--ink); }
  .btn .spin { display: inline-block; vertical-align: -2px; transform-origin: 50% 50%; }
  .btn.loading .spin { animation: spin 0.8s linear infinite; }
  @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

  .crumb {
    color: var(--muted);
    font-size: 0.95rem;
  }
  .crumb a { color: var(--accent); text-decoration: none; }
  .crumb a:hover { text-decoration: underline; }

  /* ── 게시판 목록 ── */
  .list {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .row {
    background: var(--paper);
    border: 1px solid var(--line);
    padding: 0.9rem 1.1rem;
    text-decoration: none;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 0.7rem;
    transition: background 0.15s ease, border-color 0.15s ease;
    font-weight: 500;
  }
  .row:hover { background: #fff; border-color: var(--ink); }

  /* 주황 점 */
  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex: 0 0 auto;
    background: transparent;
  }
  .row.is-new .dot {
    background: var(--new);
    box-shadow: 0 0 0 3px rgba(232,130,26,0.18);
  }

  .row .title {
    flex: 1 1 auto;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .row.is-new .title { font-weight: 700; }
  .row .meta {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--muted);
    font-size: 0.78rem;
  }
  .badge {
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 0.05rem 0.5rem;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--muted);
    background: #fff;
  }
  .new-label {
    color: var(--new);
    font-weight: 700;
    font-size: 0.72rem;
  }
  .arrow { color: var(--muted); }

  /* ── 뷰어 ── */
  .viewer-wrap {
    background: var(--paper);
    border: 1px solid var(--line);
    height: calc(100vh - 140px);
    min-height: 400px;
    display: flex;
    flex-direction: column;
  }
  .viewer-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: #fff;
  }
  .viewer-img {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #fff;
    padding: 1rem;
    cursor: zoom-in;
  }
  .viewer-img img {
    max-width: 100%;
    max-height: 100%;
    height: auto;
    display: block;
    transform-origin: center center;
    transition: transform 0.06s linear;
    user-select: none;
    -webkit-user-drag: none;
  }
  .viewer-img.zoomed { cursor: grab; }
  .viewer-img.grabbing { cursor: grabbing; }

  .empty {
    color: var(--muted);
    text-align: center;
    padding: 2.5rem 1rem;
    background: var(--paper);
    border: 1px dashed var(--line);
  }
  .empty small {
    display: block;
    margin-top: 0.6rem;
    font-size: 0.8rem;
    opacity: 0.75;
    line-height: 1.7;
  }
  .empty code {
    background: #efe9da;
    padding: 0.05rem 0.35rem;
    border-radius: 4px;
    font-size: 0.8rem;
  }

  .updated-toast {
    position: fixed;
    left: 50%;
    bottom: 1.5rem;
    transform: translateX(-50%) translateY(150%);
    background: var(--ink);
    color: #fff;
    padding: 0.6rem 1.1rem;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 500;
    box-shadow: 0 4px 14px rgba(0,0,0,0.2);
    opacity: 0;
    visibility: hidden;
    transition: transform 0.3s ease, opacity 0.3s ease, visibility 0.3s;
    z-index: 50;
  }
  .updated-toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
    visibility: visible;
  }

  @media (max-width: 640px) {
    .container { padding: 1rem; }
    .viewer-wrap { height: calc(100vh - 150px); }
    .row .meta .badge { display: none; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="topbar">
    <div class="crumb" id="crumb"></div>
    <div class="right">
      <a class="btn" id="open-new" target="_blank" rel="noopener" style="display:none;">새 탭 ↗</a>
      <button class="btn" id="refresh"><svg class="spin" viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0 0 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74A7.93 7.93 0 0 0 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg> 새로고침</button>
    </div>
  </div>

  <main id="content">
    <div class="empty">불러오는 중…</div>
  </main>

</div>

<div class="updated-toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════════════
//  설정 — 형님의 GitHub 아이디 / 저장소 이름만 맞춰주세요
// ════════════════════════════════════════════════════════════════════
const GITHUB_USER = 'seol0c';      // ← GitHub 아이디
const GITHUB_REPO = 'board';       // ← 저장소(repo) 이름
const POSTS_DIR   = 'posts';       // ← 파일을 올리는 폴더 이름
const POLL_MS     = 120000;        // 자동 확인 간격(ms). 120초 = API 제한 안전
// ════════════════════════════════════════════════════════════════════

const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${POSTS_DIR}`;
const SEEN_KEY = `board_seen::${GITHUB_USER}/${GITHUB_REPO}`;

// 확장자별 처리 방식
const IMG_EXT = ['png','jpg','jpeg','gif','webp','svg','bmp'];
const IFRAME_EXT = ['html','htm','pdf','txt'];

let posts = [];          // 현재 게시글 목록
let etag = null;         // 조건부 요청용(변경 없으면 API 사용량 0)
let firstLoadDone = false;

// ── localStorage: 본 글 기록 { path: sha } ──
function loadSeen() {
  try { return JSON.parse(localStorage.getItem(SEEN_KEY)) || null; }
  catch { return null; }
}
function saveSeen(seen) {
  localStorage.setItem(SEEN_KEY, JSON.stringify(seen));
}
function markSeen(post) {
  const seen = loadSeen() || {};
  seen[post.path] = post.sha;
  saveSeen(seen);
}

// ── 파일명 → 표시 제목 (맨 앞 정렬용 prefix 제거) ──
function toTitle(name) {
  let t = name.replace(/\.[^.]+$/, '');               // 확장자 제거
  t = t.replace(/^[\d][\d\-.]*[ _.\-]+/, '');          // 01_ / 2026-06-21_ 등 제거
  return t.trim() || name;
}
function extOf(name) {
  const m = name.toLowerCase().match(/\.([^.]+)$/);
  return m ? m[1] : '';
}

// ── GitHub에서 목록 가져오기 (ETag로 사용량 절약) ──
async function fetchPosts() {
  const headers = { 'Accept': 'application/vnd.github+json' };
  if (etag) headers['If-None-Match'] = etag;
  const res = await fetch(API_URL, { headers, cache: 'no-store' });

  if (res.status === 304) return null;                // 변경 없음
  if (res.status === 404)  return [];                 // 폴더 아직 없음
  if (!res.ok) throw new Error(`목록 불러오기 실패 (${res.status})`);

  etag = res.headers.get('etag') || etag;
  const items = await res.json();
  return items
    .filter(i => i.type === 'file')
    .map(i => ({
      name: i.name,
      path: i.path,
      sha: i.sha,
      ext: extOf(i.name),
      title: toTitle(i.name),
    }))
    .filter(p => p.ext && p.name[0] !== '.')          // 숨김파일 제외
    .sort((a, b) => b.name.localeCompare(a.name, 'ko', { numeric: true }));
}

// ── 새 글/수정된 글 판정 ──
function isNew(post, seen) {
  if (!seen) return false;            // 첫 방문은 기준점이 없으므로 점 없음
  return seen[post.path] !== post.sha;
}

// ── 토스트 ──
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── 렌더링 ──
function setCrumb(parts) {
  document.getElementById('crumb').innerHTML = parts.map((p, i) =>
    i === parts.length - 1 ? p.label : `<a href="${p.href}">${p.label}</a>`
  ).join(' / ');
}

function renderList() {
  const content = document.getElementById('content');
  document.getElementById('open-new').style.display = 'none';
  setCrumb([{ label: 'board' }]);

  if (posts.length === 0) {
    content.innerHTML = `
      <div class="empty">
        아직 올라온 글이 없습니다.
        <small><code>${POSTS_DIR}/</code> 폴더에 파일을 올리면 여기에 나타납니다.</small>
      </div>`;
    return;
  }

  const seen = loadSeen();
  const rows = posts.map(p => {
    const fresh = isNew(p, seen);
    return `
      <a class="row ${fresh ? 'is-new' : ''}" href="#${encodeURIComponent(p.name)}">
        <span class="dot"></span>
        <span class="title">${escapeHtml(p.title)}</span>
        <span class="meta">
          ${fresh ? '<span class="new-label">● 업데이트</span>' : ''}
          <span class="badge">${p.ext.toUpperCase()}</span>
          <span class="arrow">→</span>
        </span>
      </a>`;
  }).join('');
  content.innerHTML = `<div class="list">${rows}</div>`;
}

function renderViewer(post) {
  const content = document.getElementById('content');
  const rel = `${POSTS_DIR}/${encodeURIComponent(post.name)}`;  // GitHub Pages 상대경로

  setCrumb([{ label: 'board', href: '#' }, { label: post.title }]);

  // 새 탭 버튼
  const openNew = document.getElementById('open-new');
  openNew.href = rel;
  openNew.style.display = 'inline-flex';

  if (IMG_EXT.includes(post.ext)) {
    content.innerHTML = `<div class="viewer-wrap"><div class="viewer-img" id="imgpan"><img src="${rel}" alt="${escapeHtml(post.title)}" id="zimg" draggable="false"></div></div>`;
    setupImageZoom();
  } else {
    content.innerHTML = `<div class="viewer-wrap"><iframe src="${rel}" title="${escapeHtml(post.title)}"></iframe></div>`;
  }

  // 열었으니 '본 것'으로 기록 → 목록의 주황 점 사라짐
  markSeen(post);
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── 이미지 휠 줌 + 드래그 이동 (png 등) ──
function setupImageZoom() {
  const pan = document.getElementById('imgpan');
  const img = document.getElementById('zimg');
  if (!pan || !img) return;
  let zoom = 1, px = 0, py = 0, drag = false, sx, sy, spx, spy;
  const apply = () => {
    img.style.transform = `translate(${px}px, ${py}px) scale(${zoom})`;
    pan.classList.toggle('zoomed', zoom > 1);
  };
  // 마우스 휠 = 확대/축소 (최소 1배=화면맞춤, 최대 8배)
  pan.addEventListener('wheel', e => {
    e.preventDefault();
    zoom *= e.deltaY < 0 ? 1.15 : 1 / 1.15;
    zoom = Math.min(8, Math.max(1, zoom));
    if (zoom === 1) { px = 0; py = 0; }
    apply();
  }, { passive: false });
  // 확대 상태에서 드래그 = 이동
  img.addEventListener('mousedown', e => {
    if (zoom <= 1) return;
    drag = true; sx = e.clientX; sy = e.clientY; spx = px; spy = py;
    pan.classList.add('grabbing'); e.preventDefault();
  });
  pan.addEventListener('mousemove', e => {
    if (!drag) return;
    px = spx + (e.clientX - sx); py = spy + (e.clientY - sy); apply();
  });
  const endDrag = () => { drag = false; pan.classList.remove('grabbing'); };
  pan.addEventListener('mouseup', endDrag);
  pan.addEventListener('mouseleave', endDrag);
  // 더블클릭 = 원래 크기로
  img.addEventListener('dblclick', () => { zoom = 1; px = 0; py = 0; apply(); });
}

// ── 라우팅 ──
function route() {
  const hash = decodeURIComponent(location.hash.slice(1));
  if (!hash) { renderList(); return; }
  const post = posts.find(p => p.name === hash);
  if (post) renderViewer(post);
  else renderList();   // 없는 글이면 목록으로
}

// ── 새로고침(수동/자동) ──
async function refresh(announce) {
  const btn = document.getElementById('refresh');
  btn.classList.add('loading');
  try {
    const fresh = await fetchPosts();

    if (fresh !== null) {                 // 변경 있음
      const seenBefore = loadSeen();
      // 첫 방문이면 현재 글 전부를 조용히 '본 것'으로 기록(점 안 띄움)
      if (seenBefore === null) {
        const init = {};
        fresh.forEach(p => init[p.path] = p.sha);
        saveSeen(init);
      } else if (announce) {
        const before = new Set(posts.map(p => p.path + '@' + p.sha));
        const changed = fresh.filter(p => !before.has(p.path + '@' + p.sha)).length;
        if (changed > 0) toast(`업데이트 ${changed}건이 있습니다`);
      }
      posts = fresh;
    }

    firstLoadDone = true;
    route();                              // 목록/뷰어 다시 그리기
  } catch (err) {
    document.getElementById('content').innerHTML =
      `<div class="empty">불러오지 못했습니다.<small>${escapeHtml(err.message)}<br>
       설정의 <code>GITHUB_USER</code> / <code>GITHUB_REPO</code> 가 맞는지 확인해주세요.</small></div>`;
    console.error(err);
  } finally {
    btn.classList.remove('loading');
  }
}

// ── 이벤트 ──
document.getElementById('refresh').addEventListener('click', () => refresh(true));
window.addEventListener('hashchange', route);

// 탭이 다시 보일 때 자동 확인
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && firstLoadDone) refresh(true);
});

// 주기적 자동 확인 (변경 없으면 API 사용량 0)
setInterval(() => { if (document.visibilityState === 'visible') refresh(true); }, POLL_MS);

// 시작
refresh(false);
</script>
</body>
</html>
